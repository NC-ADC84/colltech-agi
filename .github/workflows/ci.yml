name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('colltech-agi/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi

      - name: Run unit tests (fast) with coverage
        working-directory: colltech-agi
        run: |
          pip install pytest-rerunfailures coverage
          coverage run -m pytest -q --maxfail=1 --reruns 2
          coverage xml -i

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: colltech-agi/coverage.xml || true

      - name: Diagnostic: list workspace and find coverage files
        run: |
          echo "--- pwd ---"
          pwd
          echo "--- list top-level ---"
          ls -la || true
          echo "--- find coverage.xml files ---"
          if command -v bash >/dev/null 2>&1; then
            bash -lc 'find . -type f -name "coverage.xml" -print || true'
          else
            Get-ChildItem -Recurse -Filter coverage.xml -ErrorAction SilentlyContinue | ForEach-Object FullName
          fi

      - name: Save diagnostic output and upload as artifact
        if: ${{ always() }}
        run: |
          echo "Finding coverage.xml files and saving to diagnostic-coverage-files.txt"
          if command -v bash >/dev/null 2>&1; then
            bash -lc 'find . -type f -name "coverage.xml" -print > diagnostic-coverage-files.txt || true'
          else
            "$(Get-ChildItem -Recurse -Filter coverage.xml -ErrorAction SilentlyContinue | ForEach-Object FullName)`n" | Out-File diagnostic-coverage-files.txt -Encoding utf8
          fi
      - name: Upload diagnostic artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-coverage-files
          path: diagnostic-coverage-files.txt

      - name: Upload to Codecov (optional)
        if: secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            coverage.xml
            colltech-agi/coverage.xml
            colltech-agi/coverage/**/*.xml
            coverage/coverage.xml
            coverage/**/*.xml
            coverage/**/coverage-*.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload pytest cache (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cache
          path: colltech-agi/.pytest_cache || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi
          pip install flake8 mypy
      - name: Run flake8
        working-directory: colltech-agi
        run: flake8 . --max-line-length=120 || true
      - name: Run mypy
        working-directory: colltech-agi
        run: mypy --ignore-missing-imports . || true

  personality-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi
      - name: Run expanded-personality tests
        working-directory: colltech-agi
        run: pytest -q tests/test_expanded_personalities.py

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    # Run on manual dispatch, on explicit commit flag, or when a PR is labeled 'run-integration'
    if: >-
      github.event_name == 'workflow_dispatch'
      || contains(github.event.head_commit.message, '[run integration]')
      || (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'run-integration')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi
      - name: Run integration tests
        working-directory: colltech-agi
        run: |
          pip install pytest-rerunfailures coverage
          pytest -q -m integration --reruns 1 || true
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: colltech-agi/test_output_*.txt || true
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: colltech-agi/htmlcov || true
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: colltech-agi/test_output_*.txt || true
 # Single CI pipeline for colltech-agi
