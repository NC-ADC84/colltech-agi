name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('colltech-agi/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi

      - name: Run unit tests (fast)
        working-directory: colltech-agi
        run: pytest -q

      - name: Upload pytest cache (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cache
          path: colltech-agi/.pytest_cache || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi
          pip install flake8 mypy
      - name: Run flake8
        working-directory: colltech-agi
        run: flake8 . --max-line-length=120 || true
      - name: Run mypy
        working-directory: colltech-agi
        run: mypy --ignore-missing-imports . || true

  personality-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi
      - name: Run expanded-personality tests
        working-directory: colltech-agi
        run: pytest -q tests/test_expanded_personalities.py

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[run integration]')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f colltech-agi/requirements.txt ]; then pip install -r colltech-agi/requirements.txt; fi
      - name: Run integration tests
        working-directory: colltech-agi
        run: pytest -q -m integration
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: colltech-agi/test_output_*.txt || true
name: CollTech-AGI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Documentation
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install markdownlint
      run: |
        npm install -g markdownlint-cli
    
    - name: Lint markdown files
      run: |
        markdownlint "**/*.md" --ignore node_modules
    
    - name: Check for linting errors
      run: |
        if markdownlint "**/*.md" --ignore node_modules; then
          echo "✅ All markdown files pass linting"
        else
          echo "❌ Linting errors found"
          exit 1
        fi

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
    
    - name: Security audit
      run: |
        pip install bandit safety
        bandit -r src/ -f json -o security_audit_bandit.json || true
        safety check --json --output security_audit_safety.json || true

  build:
    runs-on: ubuntu-latest
    name: Build Package
    needs: [lint, test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material
    
    - name: Build documentation
      run: |
        mkdocs build --clean
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
