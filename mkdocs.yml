site_name: CollTech-AGI Advanced
site_description: Consciousness-Based AGI with Advanced Features
site_author: Andre Collier
site_url: https://nc-adc84.github.io/colltech-agi

repo_name: NC-ADC84/colltech-agi
repo_url: https://github.com/NC-ADC84/colltech-agi

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - System Overview: SYSTEM_OVERVIEW.md
  - Advanced Capabilities: ADVANCED_CAPABILITIES.md
  - System Architecture: SYSTEM_ARCHITECTURE.md
  - Personality System: PERSONALITY_SYSTEM.md
  - Installation Guide: INSTALLATION_GUIDE.md
  - Deployment Guide: DEPLOYMENT_GUIDE.md
  - Security Assessment: SECURITY_ASSESSMENT_REPORT.md
  - Catalyst Integration: CATALYST_INTEGRATION_PROTOCOL.md
  - Discord Framework: DISCORD_FRAMEWORK_README.md
  - Discord Upload Package: DISCORD_UPLOAD_PACKAGE.md
  - Negentropy Submission: COLLTECH_AGI_NEGENTROPY_SUBMISSION.md

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true
